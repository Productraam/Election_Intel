# Sample nginx reverse-proxy config for Election Intelligence.
# Drop into /etc/nginx/sites-enabled/ on your server, set the server_name and
# certificate paths, then `nginx -t && systemctl reload nginx`.

upstream election_intel_app {
    server 127.0.0.1:5001;
    keepalive 16;
}

server {
    listen 80;
    server_name your-domain.example.com;
    # Force HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.example.com;

    ssl_certificate     /etc/letsencrypt/live/your-domain.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 60M;   # PDF uploads up to 50MB

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Static assets served directly
    location /static/ {
        alias /opt/election_intel/static/;
        expires 30d;
        access_log off;
    }

    # App
    location / {
        proxy_pass         http://election_intel_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # OCR uploads can be slow
        proxy_send_timeout 300s;
    }
}
